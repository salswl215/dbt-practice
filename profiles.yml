# dbt-spark + Docker Thrift Server 연결 설정
# 실행: docker compose up -d
# 연결 방식: method: thrift (실무 Spark 클러스터/AWS Glue와 동일 패턴)
dbt_practice:
  target: dev
  outputs:
    dev:
      type: spark
      method: thrift
      host: localhost
      port: 10000
      schema: jaffle_shop
      threads: 4
      connect_retries: 5
      connect_timeout: 60
