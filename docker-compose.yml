services:
  spark:
    image: bitnami/spark:3.5
    ports:
      - "10000:10000"   # Thrift Server (dbt 연결)
      - "4040:4040"     # Spark UI (실행 중인 잡 모니터링)
    environment:
      - SPARK_NO_DAEMONIZE=true
    volumes:
      - spark-warehouse:/tmp/spark-warehouse   # seed/model 데이터 영속화
    command: >
      bash -c "
        /opt/bitnami/spark/bin/spark-submit
          --class org.apache.spark.sql.hive.thriftserver.HiveThriftServer2
          --master local[*]
          --conf spark.sql.warehouse.dir=/tmp/spark-warehouse
          --hiveconf hive.server2.thrift.port=10000
          --hiveconf hive.server2.thrift.bind.host=0.0.0.0
          --hiveconf hive.server2.logging.operation.log.location=/tmp/operation_logs
      "
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/10000"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  spark-warehouse:
